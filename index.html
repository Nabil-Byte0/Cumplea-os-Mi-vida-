<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Vida Mía</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffeef2;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PANTALLA 1: BIENVENIDA */
        #pantalla1 {
            text-align: center;
            z-index: 10;
            transition: opacity 1s ease;
            cursor: pointer;
            padding: 20px;
        }
        .foto-cumple {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff4d6d;
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.3);
            animation: flotar 3s ease-in-out infinite;
        }
        .titulo-bienvenida {
            font-size: 2.5rem;
            color: #ff4d6d;
            margin-top: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .indicador-clic {
            font-size: 1.1rem;
            color: #ff758f;
            margin-top: 15px;
            animation: parpadeo 1.5s infinite;
        }

        /* PANTALLA 2: CONTENEDOR PRINCIPAL */
        #pantalla2 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0;
            pointer-events: none;
            background: linear-gradient(to bottom, #ffeef2, #ffcad4);
        }

        /* CONTENIDO IZQUIERDO: CARTA Y CONTADOR */
        .contenido-izq {
            width: 42%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4%;
            z-index: 5;
        }
        
        .contador-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.12);
            margin-bottom: 30px;
            width: 100%;
            max-width: 450px;
            opacity: 0;
            transform: translateY(30px);
        }
        .contador-box h3 {
            color: #c9184a;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: center;
        }
        .tiempo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            text-align: center;
        }
        .tiempo-grid div {
            background: #fff0f3;
            padding: 10px 5px;
            border-radius: 12px;
            border: 1px solid #ffb3c6;
        }
        .tiempo-unidad {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff4d6d;
            display: block;
        }
        .tiempo-label {
            font-size: 0.75rem;
            color: #800f2f;
            text-transform: uppercase;
            font-weight: 600;
        }

        .texto-carta {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #590d22;
            height: 250px;
            max-width: 450px;
        }

        /* CONTENIDO DERECHO: ÁRBOL CALIGRÁFICO */
        .contenido-der {
            width: 58%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor-arbol-svg {
            position: relative;
            width: 100%;
            max-width: 650px;
            height: 90vh;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Estilo de las ramas vectoriales */
        .rama-tronco {
            stroke: #5c3d2e;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Hojas de corazón absolutas alineadas al SVG */
        .corazon-hoja {
            position: absolute;
            color: #ff4d6d;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
            z-index: 3;
            line-height: 1;
        }

        /* Animaciones base */
        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Adaptación pantallas móviles */
        @media (max-width: 768px) {
            #pantalla2 { flex-direction: column-reverse; overflow-y: auto; }
            .contenido-izq { width: 100%; height: auto; padding: 40px 20px; }
            .contenido-der { width: 100%; height: 60vh; }
            .contenedor-arbol-svg { height: 100%; width: 95%; }
            .texto-carta { height: auto; }
        }
    </style>
</head>
<body>

    <div id="pantalla1" onclick="iniciarMagia()">
        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=500" alt="Tu Novia" class="foto-cumple">
        <h1 class="titulo-bienvenida">Feliz cumpleaños vida mía ❤️</h1>
        <p class="indicador-clic">Haz clic en cualquier parte para ver la magia...</p>
    </div>

    <div id="pantalla2">
        <div class="contenido-izq">
            <div id="contador" class="contador-box">
                <h3>Nuestra hermosa historia lleva:</h3>
                <div class="tiempo-grid">
                    <div><span id="anos" class="tiempo-unidad">00</span><span class="tiempo-label">Años</span></div>
                    <div><span id="dias" class="tiempo-unidad">00</span><span class="tiempo-label">Días</span></div>
                    <div><span id="horas" class="tiempo-unidad">00</span><span class="tiempo-label">Horas</span></div>
                    <div><span id="mins" class="tiempo-unidad">00</span><span class="tiempo-label">Min</span></div>
                </div>
            </div>
            <div id="textoEmocional" class="texto-carta"></div>
        </div>

        <div class="contenido-der">
            <div class="contenedor-arbol-svg" id="zonaArbol">
                <svg viewBox="0 0 600 600" id="svgArbol">
                    
<g id="capaRamas">
    <path id="tronco" class="rama-tronco" stroke-width="14"
          d="M300 580 C300 520 300 470 300 410"/>

    <path id="ramaIzq" class="rama-tronco" stroke-width="9"
          d="M300 410 C270 370 230 330 180 290"/>

    <path id="ramaDer" class="rama-tronco" stroke-width="9"
          d="M300 410 C340 370 390 330 450 285"/>

    <text id="textoFeliz"
          x="120" y="245"
          font-size="82"
          font-family="'Great Vibes', cursive"
          fill="none"
          stroke="#5c3d2e"
          stroke-width="2.8">Feliz</text>

    <text id="textoCumple"
          x="60" y="340"
          font-size="90"
          font-family="'Great Vibes', cursive"
          fill="none"
          stroke="#5c3d2e"
          stroke-width="2.8">Cumpleaños</text>
</g>

                </svg>
            </div>
        </div>
    </div>

    <script>
        const fechaNacimiento = new Date('1996-06-22T00:00:00');
        const mensajeAmor = "Hoy celebras 30 años de llenar el mundo de luz, alegría y de ser la persona más increíble que conozco. Gracias por compartir tu vida conmigo, por cada risa, cada abrazo y cada momento. Eres mi felicidad entera. Que este nuevo año de vida te traiga todo lo hermoso que te mereces. ¡Te amo con todo mi corazón! ❤️";

        const svg = document.getElementById('svgArbol');
        const zonaArbol = document.getElementById('zonaArbol');
        const coloresCorazones = ['#ff4d6d', '#ff758f', '#ffb3c6', '#c9184a', '#ff85a1'];

        // Ocultar las ramas inicialmente calculando su longitud exacta
        const pathsRamas = ['#tronco', '#palabraFeliz', '#palabraCumple'];
        pathsRamas.forEach(id => {
            const p = document.querySelector(id);
            const len = p.getTotalLength();
            p.style.strokeDasharray = len;
            p.style.strokeDashoffset = len;
        });

        // FUNCIÓN CLAVE: Distribuir corazones EXACTAMENTE siguiendo el recorrido de las palabras cursivas
        function generarCorazonesEnRamas(idPath, cantidad, delayBase) {
            const path = document.querySelector(idPath);
            const totalLen = path.getTotalLength();
            const rectArbol = zonaArbol.getBoundingClientRect();
            
            // Obtenemos las dimensiones de escala del SVG real en pantalla
            const svgWidth = 600;
            const svgHeight = 600;

            for (let i = 0; i < cantidad; i++) {
                // Distribuimos los corazones uniformemente a lo largo de la longitud del trazo de la palabra
                const distanciaSeparacion = (totalLen / cantidad) * i;
                const puntoSVG = path.getPointAtLength(distanciaSeparacion);

                // Convertimos coordenadas del plano del SVG (0-600) a porcentajes del contenedor web
                const pctX = (puntoSVG.x / svgWidth) * 100;
                const pctY = (puntoSVG.y / svgHeight) * 100;

                // Añadimos una pequeña variación aleatoria para simular el follaje natural de un árbol
                const dispersionX = (Math.random() * 24 - 12); // Desviación en píxeles
                const dispersionY = (Math.random() * 24 - 12); 

                let corazon = document.createElement('div');
                corazon.innerHTML = '❤';
                corazon.className = 'corazon-hoja';
                
                // Variaciones visuales individuales
                const tamano = Math.random() * 0.9 + 0.6; // tamaños entre 0.6rem y 1.5rem
                const color = coloresCorazones[Math.floor(Math.random() * coloresCorazones.length)];
                const rotacion = Math.random() * 50 - 25;

                corazon.style.left = `calc(${pctX}% + ${dispersionX}px)`;
                corazon.style.top = `calc(${pctY}% + ${dispersionY}px)`;
                corazon.style.fontSize = `${tamano}rem`;
                corazon.style.color = color;
                
                // Guardamos una clase identificadora para animarlos secuencialmente con GSAP
                corazon.classList.add(`hojas-${idPath.replace('#', '')}`);
                
                zonaArbol.appendChild(corazon);
            }
        }

        // Generamos los corazones anclados a la geometría exacta de la cursiva antes de empezar la animación
        generarCorazonesEnRamas('#palabraFeliz', 90);
        generarCorazonesEnRamas('#palabraCumple', 130);

        function iniciarMagia() {
            const p1 = document.getElementById('pantalla1');
            p1.style.opacity = '0';
            
            setTimeout(() => {
                p1.style.display = 'none';
                const p2 = document.getElementById('pantalla2');
                p2.style.opacity = '1';
                p2.style.pointerEvents = 'auto';
                
                // Línea de tiempo maestra de GSAP
                const tl = gsap.timeline();

                // 1. Crece primero el tronco central
                tl.to('#tronco', {
                    strokeDashoffset: 0,
                    duration: 1.2,
                    ease: "power1.inOut"
                })
                // 2. Nacen las ramas caligráficas laterales y se escriben solas de forma simultánea
                .to('#palabraFeliz', {
                    strokeDashoffset: 0,
                    duration: 3.5,
                    ease: "power1.out"
                }, "-=0.2")
                .to('#palabraCumple', {
                    strokeDashoffset: 0,
                    duration: 4.2,
                    ease: "power1.out"
                }, "-=3.2")
                
                // 3. Brotan de inmediato los corazones sobre la palabra "Feliz" siguiendo el trazo
                .to('.hojas-palabraFeliz', {
                    scale: 1,
                    opacity: 0.95,
                    duration: 0.8,
                    stagger: 0.008, 
                    ease: "back.out(2.5)"
                }, "-=2.2")

                // 4. Brotan los corazones sobre la palabra "Cumpleaños" siguiendo su trazo caligráfico
                .to('.hojas-palabraCumple', {
                    scale: 1,
                    opacity: 0.95,
                    duration: 0.8,
                    stagger: 0.006,
                    ease: "back.out(2.5)"
                }, "-=1.8")

                // 5. Se revela el panel de carta/contador izquierdo y se ejecuta la máquina de escribir
                .to('#contador', { 
                    opacity: 1, 
                    y: 0, 
                    duration: 1.2, 
                    ease: "power3.out" 
                }, "-=0.5")
                .call(() => {
                    actualizarContador();
                    setInterval(actualizarContador, 60000);
                    maquinaEscribir(mensajeAmor, 'textoEmocional', 35);
                });

            }, 1000);
        }

        function actualizarContador() {
            const ahora = new Date();
            let anos = ahora.getFullYear() - fechaNacimiento.getFullYear();
            let mesActual = ahora.getMonth();
            let mesNac = fechaNacimiento.getMonth();
            
            if (mesActual < mesNac || (mesActual === mesNac && ahora.getDate() < fechaNacimiento.getDate())) {
                anos--;
            }

            const diferenciaMs = ahora - fechaNacimiento;
            const totalDias = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24));
            const horas = ahora.getHours();
            const minutos = ahora.getMinutes();

            document.getElementById('anos').innerText = anos;
            document.getElementById('dias').innerText = totalDias;
            document.getElementById('horas').innerText = String(horas).padStart(2, '0');
            document.getElementById('mins').innerText = String(minutos).padStart(2, '0');
        }

        function maquinaEscribir(texto, elementoId, velocidad) {
            let i = 0;
            const elemento = document.getElementById(elementoId);
            elemento.innerHTML = "";
            
            function escribir() {
                if (i < texto.length) {
                    elemento.innerHTML += texto.charAt(i);
                    i++;
                    setTimeout(escribir, velocidad);
                }
            }
            escribir();
        }
    </script>
</body>
</html>

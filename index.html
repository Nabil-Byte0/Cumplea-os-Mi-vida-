<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Vida Mía 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;700&family=EB+Garamond:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-image: linear-gradient(rgba(74, 61, 49, 0.7), rgba(74, 61, 49, 0.7)), 
                              url('https://github.com/Nabil-Byte0/Cumplea-os-Mi-vida-/blob/main/Fondo.jpg?raw=true');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'EB Garamond', serif;
            overflow: hidden;
            height: 100vh;
            height: 100dvh; /* Fix para barras de navegación móviles */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            perspective: 1500px;
        }

        .filtro-svg { position: absolute; width: 0; height: 0; }

        #pantalla1 {
            text-align: center;
            z-index: 10;
            transition: opacity 1s ease;
            cursor: pointer;
            padding: 20px;
            color: #e6d5b8;
            width: 100%;
            max-width: 400px;
        }
        .foto-cumple {
            width: 210px;
            height: 270px;
            border-radius: 50% / 45% 45% 55% 55%; 
            object-fit: cover;
            border: 6px double #d4af37; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: flotar 4s ease-in-out infinite;
        }
        .titulo-bienvenida {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.5rem;
            color: #fffaf0;
            margin-top: 25px;
            line-height: 1.3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .indicador-clic {
            font-style: italic;
            color: #d4c4a8;
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: bold;
            animation: parpadeo 2s infinite;
        }

        #pantalla2 {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            padding: 20px;
        }

        .tarjeta-contenedor-3d {
            width: 100%;
            max-width: 540px; 
            height: 85vh; 
            height: 85dvh;
            max-height: 650px;
            position: relative;
            transform-style: preserve-3d;
        }

        .tarjeta-contenido {
            width: 100%;
            height: 100%;
            padding: 40px 45px 75px 45px;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            background: transparent;
            backface-visibility: hidden;
            transition: transform 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 1.2s ease;
            transform-origin: left center;
        }

        .tarjeta-contenido::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, #f3e1c2 40%, #dfc397 75%, #b59263 95%, #8c6539 100%);
            filter: url(#borde-pergamino);
            box-shadow: inset 0 0 40px rgba(92, 59, 29, 0.55), inset 0 0 10px rgba(0, 0, 0, 0.3), 5px 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .tarjeta-contenido.activa { transform: rotateY(0deg); z-index: 5; opacity: 1; }
        .tarjeta-contenido.pasada { transform: rotateY(-140deg); z-index: 2; opacity: 0; pointer-events: none; }
        .tarjeta-contenido.futura { transform: rotateY(20deg); z-index: 1; opacity: 0; pointer-events: none; }

        .contenido-seguro { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }

        .contador-box { width: 100%; margin-bottom: 20px; border-bottom: 1px dashed rgba(92, 59, 29, 0.6); padding-bottom: 15px; flex-shrink: 0; opacity: 0; }
        .contador-box h3 { font-family: 'Cinzel', serif; color: #38220f; font-size: 0.95rem; margin-bottom: 10px; text-align: center; letter-spacing: 2px; font-weight: 700; }
        .tiempo-grid { display: flex; justify-content: center; gap: 20px; text-align: center; }
        .tiempo-unidad { font-family: 'Cinzel', serif; font-size: 1.7rem; font-weight: 700; color: #7a1f1f; }
        .tiempo-label { font-size: 0.75rem; color: #4a3119; font-style: italic; font-weight: 600; display: block; }

        .texto-carta { font-family: 'EB Garamond', serif; font-size: 1.3rem; font-weight: 500; line-height: 1.55; color: #1a1008; text-align: justify; width: 100%; height: 100%; white-space: pre-wrap; opacity: 0; overflow-y: auto; padding-right: 5px; }

        .btn-siguiente { position: absolute; bottom: 25px; right: 40px; background: none; border: none; font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 700; color: #7a1f1f; cursor: pointer; display: flex; align-items: center; gap: 8px; z-index: 10; transition: transform 0.3s ease, color 0.3s ease; text-transform: uppercase; letter-spacing: 1px; opacity: 0; }
        .btn-siguiente:hover { transform: translateX(4px); color: #4a1010; }

        @keyframes flotar { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(1deg); } }
        @keyframes parpadeo { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ====== OPTIMIZACIÓN CORREGIDA PARA TELÉFONOS MÓVILES ====== */
        @media (max-width: 480px) {
            body { padding: 10px; height: 100dvh; }
            
            .foto-cumple { width: 150px; height: 200px; }
            .titulo-bienvenida { font-size: 1.7rem; margin-top: 12px; }
            .indicador-clic { font-size: 0.75rem; margin-top: 12px; }

            /* Ajuste de altura dinámica y reducción de paddings para dar más espacio al contenido */
            .tarjeta-contenedor-3d { height: 92dvh; max-height: 660px; }
            .tarjeta-contenido { padding: 25px 20px 55px 20px; }
            
            .contador-box { margin-bottom: 12px; padding-bottom: 8px; }
            .contador-box h3 { font-size: 0.75rem; margin-bottom: 5px; letter-spacing: 1px; }
            .tiempo-grid { gap: 12px; }
            .tiempo-unidad { font-size: 1.3rem; }
            .tiempo-label { font-size: 0.6rem; }

            .texto-carta { 
                font-size: 1.05rem; 
                line-height: 1.45; 
                scrollbar-width: thin;
                scrollbar-color: rgba(92, 59, 29, 0.3) transparent;
            }
            .texto-carta::-webkit-scrollbar { width: 3px; }
            .texto-carta::-webkit-scrollbar-thumb { background: rgba(92, 59, 29, 0.2); border-radius: 2px; }

            /* Reposicionamiento seguro de los botones inferiores */
            .btn-siguiente { bottom: 15px; right: 25px; font-size: 0.75rem; }
            #btn2, #btn3 { left: 25px !important; right: auto !important; }
            #btn2-sig, #btn-regalo { right: 25px !important; left: auto !important; }
            
            #ventanaRegalo > div { max-width: 90% !important; padding: 35px 20px !important; }
            #ventanaRegalo p { font-size: 1.25rem !important; margin-bottom: 20px !important; }
        }
    </style>
</head>
<body>

    <svg class="filtro-svg"><defs><filter id="borde-pergamino"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" /><feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" /></filter></defs></svg>

    <div id="pantalla1" onclick="iniciarMagia()">
        <img src="https://github.com/Nabil-Byte0/Cumplea-os-Mi-vida-/blob/main/Mi%20ni%C3%B1a%20Hermosa.png?raw=true" alt="Tu Novia" class="foto-cumple">
        <h1 class="titulo-bienvenida">Feliz Cumpleaños<br>Vida Mía</h1>
        <p class="indicador-clic">Romper el sello del pergamino</p>
    </div>

    <div id="pantalla2">
        <div class="tarjeta-contenedor-3d">
            <div class="tarjeta-contenido activa" id="pag1">
                <div class="contenido-seguro">
                    <div class="contador-box" id="cajaContador">
                        <h3>Esta hermosura nació hace:</h3>
                        <div class="tiempo-grid">
                            <div><span id="anos" class="tiempo-unidad">0</span><span class="tiempo-label">Años</span></div>
                            <div><span id="dias" class="tiempo-unidad">0</span><span class="tiempo-label">Días</span></div>
                            <div><span id="horas" class="tiempo-unidad">0</span><span class="tiempo-label">Hrs</span></div>
                            <div><span id="mins" class="tiempo-unidad">0</span><span class="tiempo-label">Min</span></div>
                        </div>
                    </div>
                    <div id="textoPag1" class="texto-carta"></div>
                </div>
                <button class="btn-siguiente" id="btn1" onclick="cambiarPagina(1, 'adelante')">Siguiente Pagina <svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg></button>
            </div>
            <div class="tarjeta-contenido futura" id="pag2">
                <div class="contenido-seguro"><div id="textoPag2" class="texto-carta"></div></div>
                <button class="btn-siguiente" id="btn2" style="opacity: 1; left: 40px; right: auto;" onclick="cambiarPagina(2, 'atras')">Atrás</button>
                <button class="btn-siguiente" id="btn2-sig" style="opacity: 0;" onclick="cambiarPagina(2, 'adelante')">Siguiente</button>
            </div>
            <div class="tarjeta-contenido futura" id="pag3">
                <div class="contenido-seguro"><div id="textoPag3" class="texto-carta"></div></div>
                <button class="btn-siguiente" id="btn3" style="opacity: 1; left: 40px; right: auto;" onclick="cambiarPagina(3, 'atras')">Atrás</button>
                <button class="btn-siguiente" id="btn-regalo" style="opacity: 0; right: 40px;" onclick="mostrarRegalo()">Abrir regalo</button>
            </div>
        </div>
    </div>

    <div id="ventanaRegalo" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; opacity: 0;">
        <div style="position: relative; width: 100%; max-width: 420px; padding: 45px 35px; text-align: center; border-radius: 4px;">
            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle, #f3e1c2 40%, #dfc397 75%, #b59263 95%, #8c6539 100%); filter: url(#borde-pergamino); box-shadow: inset 0 0 30px rgba(92, 59, 29, 0.55), 0 10px 35px rgba(0,0,0,0.6); z-index: 1;"></div>
            <div style="position: relative; z-index: 2;">
                <p style="font-family: 'EB Garamond', serif; font-size: 1.7rem; font-weight: 700; color: #1a1008; line-height: 1.5; margin-bottom: 30px;">Te lo doy en diciembre 😜.<br>Te AMO.</p>
                <button style="background: none; border: none; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; color: #7a1f1f; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.2s;" onclick="cerrarRegalo()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const fechaNacimiento = new Date('1996-06-22T00:00:00');
        const paginasTexto = [
            `Hola mi amor, en este día tan especial quiero recordarte la expendida y maravillosa persona que fuiste, eres y serás (No tengo la menor duda). Se que no es la manera en que te gustaría y que me gustaría a mi darte esto, pero es lo que puedo hacer y permitir de la distancia que nos separa.\n\nTu eres una persona inigualable que siempre saca lo mejor de las personas que rodea, eres una gran inspiración y orgullo para mi y no sabes que tan afortunado me siento todos los días de tener a una mujer como lo eres tu: tan maravillosa, tan especial, tan hermosa, tan única.`,
            `Doy gracias a la vida por ponerme en tu camino y que me vieras por lo que me ves, siento que toda mi suerte y el de todas mis vidas se concentraron in ti y en el que estés presente en mi vida.\n\nQuisiera ser un mejor hombre para ti y me encetaría ser la persona que necesitas en este momento, pero quiero decirte que aunque el camino sea un poco extenso y complejo, nunca me rendiré de intentar ser ese hombre para ti, hasta logarlo. Quisiera llenarte de regalos y que este día fuera el día mas inolvidable de tu vida, que, por circunstancias de la vida no va a transcurrir como quisiera.\n\nSin mas, quiero desearte un muy feliz cumpleaños, eres una persona muy especial y alguien extraordinaria en mi vida, que me hace cada día ser mejor.`,
            `Nunca cambies ya que tu eres completamente perfecta ante mis ojos. Tu vida vale mas que cualquier cosa que pueda tener o comprar y es demasiado hermoso que decidas compartirla conmigo.\n\nAnhelo escribirte y desearte por muchos años mas cartas como esta, poder entregarlas y brindarlas como corresponde, se que Dios tiene un futuro muy hermoso preparado nosotros con un sin fin de momentos y experiencias juntos. Te amo y gracias a la vida y a Dios por tenerte presente y darte mucha salud y bienestar.\n\nCon mucho amor y anhelo... Te amo con todo mi corazón, mi alma y cuerpo, y espero poder celebrar muchos años mas a tu lado. \n\nTe desea Feliz Cumpleaños, tu gatito Nabil 💕.`
        ];

        let timerEscritura = null;
        let paginasCargadas = [false, false, false];

        function iniciarMagia() {
            const p1 = document.getElementById('pantalla1');
            p1.style.opacity = '0';
            setTimeout(() => {
                p1.style.display = 'none';
                document.getElementById('pantalla2').style.opacity = '1';
                document.getElementById('pantalla2').style.pointerEvents = 'auto';

                gsap.fromTo('#cajaContador',
                    { opacity: 0, y: 25, scale: 0.97 },
                    { 
                        opacity: 1,
                        y: 0,
                        scale: 1,
                        duration: 1.6,
                        ease: "power3.out",
                        onComplete: escribirContador
                    }
                );

            }, 1000);
        }

        function escribirContador() {
            const ahora = new Date();
            const offset = -7 * 60 * 60 * 1000;
            const t = new Date(ahora.getTime() + (ahora.getTimezoneOffset() * 60000) + offset);
            let anos = t.getFullYear() - fechaNacimiento.getFullYear();
            if (t.getMonth() < fechaNacimiento.getMonth() || (t.getMonth() === fechaNacimiento.getMonth() && t.getDate() < fechaNacimiento.getDate())) anos--;
            
            const valores = {
                anos: anos,
                dias: Math.floor((t - fechaNacimiento) / 86400000),
                hours: String(t.getHours()).padStart(2, '0'),
                mins: String(t.getMinutes()).padStart(2, '0')
            };

            const mapeoIds = { anos: 'anos', dias: 'dias', hours: 'horas', mins: 'mins' };

            Object.keys(mapeoIds).forEach(key => {
                let idHtml = mapeoIds[key];
                let val = String(valores[key]);
                let i = 0;
                let el = document.getElementById(idHtml);
                el.innerText = "";
                function escribir() {
                    if (i < val.length) {
                        el.innerText += val[i];
                        i++;
                        setTimeout(escribir, 100);
                    }
                }
                escribir();
            });

            setTimeout(() => {
                const textoEl = document.getElementById('textoPag1');
                textoEl.style.opacity = '1';
                escribirPagina(0, 'textoPag1', 'btn1');
            }, 1000);
        }

        function escribirPagina(numPag, elementoId, botonId) {
            if (paginasCargadas[numPag]) {
                if(botonId) gsap.to('#' + botonId, { opacity: 1, duration: 0.5 });
                return;
            }
            let i = 0;
            const texto = paginasTexto[numPag];
            const elemento = document.getElementById(elementoId);
            elemento.innerHTML = "";
            function escribir() {
                if (i < texto.length) {
                    elemento.innerHTML += texto.charAt(i);
                    elemento.scrollTop = elemento.scrollHeight;
                    i++;
                    timerEscritura = setTimeout(escribir, 8);
                } else {
                    paginasCargadas[numPag] = true;
                    if (botonId) gsap.to('#' + botonId, { opacity: 1, duration: 0.5 });
                }
            }
            escribir();
        }

        function cambiarPagina(pagActual, direccion) {
            clearTimeout(timerEscritura);
            if (direccion === 'adelante') {
                document.getElementById('pag' + pagActual).className = "tarjeta-contenido pasada";
                document.getElementById('pag' + (pagActual + 1)).className = "tarjeta-contenido activa";
                document.getElementById('textoPag' + (pagActual + 1)).style.opacity = '1';
                escribirPagina(pagActual, 'textoPag' + (pagActual + 1), pagActual === 1 ? 'btn2-sig' : (pagActual === 2 ? 'btn-regalo' : null));
            } else {
                document.getElementById('pag' + pagActual).className = "tarjeta-contenido futura";
                document.getElementById('pag' + (pagActual - 1)).className = "tarjeta-contenido activa";
            }
        }

        function mostrarRegalo() {
            const ventana = document.getElementById('ventanaRegalo');
            ventana.style.display = 'flex';
            gsap.to(ventana, { opacity: 1, duration: 0.5 });
        }

        function cerrarRegalo() {
            const ventana = document.getElementById('ventanaRegalo');
            gsap.to(ventana, { opacity: 0, duration: 0.5, onComplete: () => {
                ventana.style.display = 'none';
            }});
        }
    </script>
</body>
</html>
